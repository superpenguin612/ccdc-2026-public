# Expand Event Log sizes to handle increased logging volume
- name: Set Security Log Max Size (512MB)
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\Security
    name: MaxSize
    data: 536870912
    type: dword
    state: present

- name: Set System Log Max Size (256MB)
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\System
    name: MaxSize
    data: 268435456
    type: dword
    state: present

- name: Set Application Log Max Size (256MB)
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\Application
    name: MaxSize
    data: 268435456
    type: dword
    state: present

# Enable command line logging in process creation events
- name: Enable Command Line Logging in Process Creation
  win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\Audit
    name: ProcessCreationIncludeCmdLine_Enabled
    data: 1
    type: dword
    state: present