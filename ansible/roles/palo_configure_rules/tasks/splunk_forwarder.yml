---
- name: Allow inbound Splunk Forwarder
  paloaltonetworks.panos.panos_security_rule:
    provider: "{{ panos_provider }}"
    rule_name: "Inbound_SplunkForward_{{ hostvars[host_item]['inventory_hostname'] }}"
    source_zone: ["external"]
    source_ip: ["Remote_Pub_Net"]
    destination_zone: ["internal"]
    destination_ip: ["External_{{ hostvars[host_item]['inventory_hostname'] }}"]
    application: "{{ app_type_mappings.fw_splunk_forwarder.palo_apps }}"
    service: "{{ app_type_mappings.fw_splunk_forwarder.palo_service }}"
    action: "allow"
    log_setting: "{{ palo_log_setting }}"
  loop: "{{ groups['fw_splunk'] | default([]) | intersect(groups[protected_group] | default([])) }}"
  loop_control:
    loop_var: host_item
