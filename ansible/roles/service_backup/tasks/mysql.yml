---
- name: MySQL — ensure backup directory exists on host
  ansible.builtin.file:
    path: "{{ linux_backup_root }}/mysql"
    state: directory
    mode: "0700"
    owner: root
    group: root
  become: true

- name: MySQL — dump all databases
  ansible.builtin.shell: >
    mysqldump {{ svc_mysql_databases }}
    --single-transaction --quick --lock-tables=false
    | gzip > {{ linux_backup_root }}/mysql/mysql_all.sql.gz
  become: true

- name: MySQL — archive /etc/mysql
  ansible.builtin.command: >
    tar -czf {{ linux_backup_root }}/mysql/mysql_config.tar.gz
    -C / etc/mysql
  become: true
  failed_when: false  # config dir may be /etc/mysql or /etc/my.cnf.d

- name: MySQL — archive /etc/my.cnf and /etc/my.cnf.d if present
  ansible.builtin.shell: |
    files=""
    [ -f /etc/my.cnf ] && files="$files etc/my.cnf"
    [ -d /etc/my.cnf.d ] && files="$files etc/my.cnf.d"
    [ -n "$files" ] && tar -czf {{ linux_backup_root }}/mysql/mysql_myconf.tar.gz -C / $files || true
  become: true

- name: MySQL — record installed packages
  ansible.builtin.shell: >
    dpkg -l 2>/dev/null | grep -E '^ii\s+(mysql|mariadb)' | awk '{print $2}'
    > {{ linux_backup_root }}/mysql/mysql_packages.txt
  become: true
