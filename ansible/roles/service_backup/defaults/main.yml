---
# Local backup directory on each host — no controller transfer.
# Linux hosts use /root/.ccdc_backups/<service>/
# Windows hosts use C:\ccdc_backups\<service>\
linux_backup_root: /root/.ccdc_backups
win_backup_root: 'C:\ccdc_backups'

# --- Apache ---
svc_apache2_webroot: /var/www

# --- MySQL ---
# Auth via unix_socket (root OS user = root DB user, no password needed)
svc_mysql_databases: "--all-databases"

# --- Splunk ---
svc_splunk_home: /opt/splunk

# --- IIS (server-web) ---
svc_iis_webroot: 'C:\inetpub\wwwroot'
svc_iis_config_dir: 'C:\Windows\System32\inetsrv\config'

# --- IIS FTP (server-ftp) ---
svc_iis_ftp_root: 'C:\inetpub\ftproot'

# --- DNS (server-ad-dns) ---
# Zone files are exported via dnscmd to this directory before zipping
svc_dns_export_dir: 'C:\Windows\System32\dns\backup'
