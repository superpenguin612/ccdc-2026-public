# ---------------------------------------------------------------------------
# Final: re-enable all profiles now that all CCDC allow rules are in place
# ---------------------------------------------------------------------------
- name: Re-enable all firewall profiles (CCDC rules now active)
  ansible.windows.win_shell: |
    Set-NetFirewallProfile -Profile Domain,Private,Public -Enabled True
  changed_when: false
