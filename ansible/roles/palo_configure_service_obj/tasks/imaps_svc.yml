---
- name: Create IMAPS port
  paloaltonetworks.panos.panos_service_object:
    provider: "{{ panos_provider }}"
    name: "{{ app_type_mappings.fw_imaps.palo_service[0] }}"
    protocol: "tcp"
    destination_port: "{{ app_type_mappings.fw_imaps.ports[0] }}"
  when: groups['fw_imaps'] | default([]) | length > 0
