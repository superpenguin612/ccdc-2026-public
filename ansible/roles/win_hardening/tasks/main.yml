- name: Limit cached domain logons (reduce credential exposure)
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: CachedLogonsCount
    data: "1"
    type: string
    state: present
  when: windows_hardening_limit_cached_logons

- name: Disable WPAD (prevent WPAD-based credential capture)
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Internet Settings\WinHttp
    name: DisableWpad
    data: 1
    type: dword
    state: present
  when: windows_hardening_disable_wpad

- name: Disable NetBIOS name resolution (prevents NBNS poisoning)
  ansible.windows.win_shell: |
    $changed = $false
    Get-WmiObject Win32_NetworkAdapterConfiguration | Where-Object { $_.IPEnabled -eq $true } | ForEach-Object {
      if ($_.TcpipNetbiosOptions -ne 2) {
        $_.SetTcpipNetbios(2) | Out-Null
        $changed = $true
      }
    }
    if ($changed) { Write-Output 'changed' }
  register: netbios_disable
  changed_when: "'changed' in netbios_disable.stdout"
  when: windows_hardening_disable_netbios

- name: Disable mDNS (prevents mDNS poisoning alongside LLMNR)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\Dnscache\Parameters
    name: EnableMDNS
    data: 0
    type: dword
    state: present
  when: windows_hardening_disable_mdns

- name: Block remote SAM access (prevents remote user enumeration)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Lsa
    name: RestrictRemoteSAM
    data: "O:BAG:BAD:(A;;RC;;;BA)"
    type: string
    state: present
  when: windows_hardening_restrict_remote_sam

- name: Disable RDP if not needed (attack surface reduction)
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server
    name: fDenyTSConnections
    data: 1
    type: dword
    state: present
  when: windows_hardening_disable_rdp

- name: Disable WScript and CScript (prevent VBScript/JScript malware)
  ansible.windows.win_shell: |
    $changed = $false
    $keys = @(
      'HKLM:\SOFTWARE\Microsoft\Windows Script Host\Settings',
      'HKCU:\SOFTWARE\Microsoft\Windows Script Host\Settings'
    )
    foreach ($key in $keys) {
      if (-not (Test-Path $key)) { New-Item -Path $key -Force | Out-Null }
      $val = (Get-ItemProperty -Path $key -Name Enabled -ErrorAction SilentlyContinue).Enabled
      if ($val -ne 0) {
        Set-ItemProperty -Path $key -Name Enabled -Value 0 -Type DWord
        $changed = $true
      }
    }
    if ($changed) { Write-Output 'changed' }
  register: wscript_disable
  changed_when: "'changed' in wscript_disable.stdout"
  when: windows_hardening_disable_wscript

- name: Enable UAC and require admin approval for all elevation
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: dword
    state: present
  loop:
    - { name: EnableLUA, data: 1 }
    - { name: ConsentPromptBehaviorAdmin, data: 2 }
    - { name: ConsentPromptBehaviorUser, data: 3 }
    - { name: PromptOnSecureDesktop, data: 1 }
  when: windows_hardening_enforce_uac

- name: Enforce Netlogon protections on domain controllers
  ansible.windows.win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\Netlogon\Parameters
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: dword
    state: present
  loop:
    - { name: FullSecureChannelProtection, data: 1 }
    - { name: RequireSignOrSeal, data: 1 }
    - { name: SealSecureChannel, data: 1 }
    - { name: SignSecureChannel, data: 1 }
    - { name: RequireStrongKey, data: 1 }
  when:
    - windows_hardening_enforce_dc_netlogon_protection
    - inventory_hostname in groups['domain_controllers']