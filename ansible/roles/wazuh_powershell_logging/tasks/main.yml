---
- name: Enable PowerShell Module Logging
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\ModuleLogging
    name: EnableModuleLogging
    data: 1
    type: dword
    state: present
  register: a

- name: Configure Module Names for Logging
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\ModuleLogging\ModuleNames
    name: "*"
    data: "*"
    type: string
    state: present
  register: b

- name: Enable PowerShell Script Block Logging
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
    name: EnableScriptBlockLogging
    data: 1
    type: dword
    state: present
  register: c

- name: Enable PowerShell Script Block Invocation Logging
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
    name: EnableScriptBlockInvocationLogging
    data: 1
    type: dword
    state: present
  register: d

- name: Enable PowerShell Transcription Logging
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\Transcription
    name: EnableTranscripting
    data: 1
    type: dword
    state: present
  register: e

- name: Enable PowerShell Transcription Invocation Header
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\Transcription
    name: IncludeInvocationHeader
    data: 1
    type: dword
    state: present
  register: f

- name: Force Group Policy Update
  ansible.windows.win_command: gpupdate /force
  when: a.changed or b.changed or c.changed or d.changed or e.changed or f.changed
  changed_when: true

- name: Check if Wazuh Already Forwards PowerShell Logs
  ansible.windows.win_shell: |
    if (Get-Content 'C:\Program Files (x86)\ossec-agent\ossec.conf' -ErrorAction SilentlyContinue | Select-String '<location>Microsoft-Windows-PowerShell/Operational</location>' -Quiet) {
      Write-Output 'found'
    } else {
      Write-Output ''
    }
  changed_when: false
  register: powershell_wazuh_config

- name: Ensure Wazuh Forwards PowerShell Logs
  randrej.windows.win_blockinfile:
    path: 'C:\Program Files (x86)\ossec-agent\ossec.conf'
    insertbefore: "</ossec_config>"
    block: |
      <localfile>
        <location>Microsoft-Windows-PowerShell/Operational</location>
        <log_format>eventchannel</log_format>
      </localfile>
    marker: "<!-- CCDC Wazuh PowerShell {mark} -->"
    state: present
  when: powershell_wazuh_config.stdout == ''
  notify: Restart Wazuh Agent
