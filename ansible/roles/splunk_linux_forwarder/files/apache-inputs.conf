# =============================================================================
# Splunk UF — Apache2/httpd inputs (deployed to svc_apache2 hosts)
# =============================================================================

# ---------------------------------------------------------------------------
# Apache2 access log — all HTTP requests
# ---------------------------------------------------------------------------
[monitor:///var/log/apache2/access.log]
disabled = 0
index = web
sourcetype = access_combined
recursive = false

[monitor:///var/log/httpd/access_log]
disabled = 0
index = web
sourcetype = access_combined
recursive = false

# ---------------------------------------------------------------------------
# Apache2 error log — 4xx/5xx, config errors, crashes
# ---------------------------------------------------------------------------
[monitor:///var/log/apache2/error.log]
disabled = 0
index = web
sourcetype = apache_error
recursive = false

[monitor:///var/log/httpd/error_log]
disabled = 0
index = web
sourcetype = apache_error
recursive = false

# ---------------------------------------------------------------------------
# Virtual host logs (wildcard — catches per-vhost access/error logs)
# ---------------------------------------------------------------------------
[monitor:///var/log/apache2/*.log]
disabled = 0
index = web
sourcetype = access_combined
recursive = false

[monitor:///var/log/httpd/*.log]
disabled = 0
index = web
sourcetype = access_combined
recursive = false
