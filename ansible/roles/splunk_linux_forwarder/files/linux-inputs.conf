# =============================================================================
# Splunk Universal Forwarder — Linux base inputs
# Deployed to all Linux hosts
# =============================================================================

# ---------------------------------------------------------------------------
# Syslog — general system messages
# ---------------------------------------------------------------------------
[monitor:///var/log/syslog]
disabled = 0
index = linux
sourcetype = syslog
recursive = false

[monitor:///var/log/messages]
disabled = 0
index = linux
sourcetype = syslog
recursive = false

# ---------------------------------------------------------------------------
# Authentication — login attempts, sudo, SSH
# ---------------------------------------------------------------------------
[monitor:///var/log/auth.log]
disabled = 0
index = linux
sourcetype = linux_secure
recursive = false

[monitor:///var/log/secure]
disabled = 0
index = linux
sourcetype = linux_secure
recursive = false

# ---------------------------------------------------------------------------
# Kernel ring buffer
# ---------------------------------------------------------------------------
[monitor:///var/log/kern.log]
disabled = 0
index = linux
sourcetype = linux_messages_syslog
recursive = false

# ---------------------------------------------------------------------------
# Cron — scheduled job execution (persistence detection)
# ---------------------------------------------------------------------------
[monitor:///var/log/cron]
disabled = 0
index = linux
sourcetype = linux_messages_syslog
recursive = false

[monitor:///var/log/cron.log]
disabled = 0
index = linux
sourcetype = linux_messages_syslog
recursive = false

# ---------------------------------------------------------------------------
# dpkg / rpm — package installs (detect attacker installing tools)
# ---------------------------------------------------------------------------
[monitor:///var/log/dpkg.log]
disabled = 0
index = linux
sourcetype = dpkg
recursive = false

[monitor:///var/log/rpm.log]
disabled = 0
index = linux
sourcetype = rpm
recursive = false

# ---------------------------------------------------------------------------
# Audit daemon (auditd) — syscall events, file access, exec
# ---------------------------------------------------------------------------
[monitor:///var/log/audit/audit.log]
disabled = 0
index = linux
sourcetype = linux:audit
recursive = false

