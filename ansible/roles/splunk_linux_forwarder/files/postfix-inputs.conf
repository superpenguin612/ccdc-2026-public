# =============================================================================
# Splunk UF — Postfix/Dovecot mail inputs (deployed to svc_postfix hosts)
# =============================================================================

# ---------------------------------------------------------------------------
# Postfix mail log — SMTP send/receive, queue events, auth failures
# ---------------------------------------------------------------------------
[monitor:///var/log/mail.log]
disabled = 0
index = mail
sourcetype = postfix_syslog
recursive = false

[monitor:///var/log/maillog]
disabled = 0
index = mail
sourcetype = postfix_syslog
recursive = false

# ---------------------------------------------------------------------------
# Mail error log
# ---------------------------------------------------------------------------
[monitor:///var/log/mail.err]
disabled = 0
index = mail
sourcetype = postfix_syslog
recursive = false

# ---------------------------------------------------------------------------
# Dovecot log (POP3/IMAP auth, logins, disconnects)
# On some distros Dovecot logs to syslog; on others it has its own file
# ---------------------------------------------------------------------------
[monitor:///var/log/dovecot.log]
disabled = 0
index = mail
sourcetype = dovecot
recursive = false

[monitor:///var/log/dovecot-info.log]
disabled = 0
index = mail
sourcetype = dovecot
recursive = false
