---
# ---------------------------------------------------------------------------
# 1. Detect PHP-FPM ini path and service name dynamically
# ---------------------------------------------------------------------------
- name: PHP — find FPM php.ini (highest installed version)
  ansible.builtin.shell: |
    find /etc/php -name php.ini -path "*/fpm/*" 2>/dev/null | sort -V | tail -1
  register: _php_fpm_ini
  changed_when: false
  become: true

- name: PHP — find FPM service name
  ansible.builtin.shell: |
    systemctl list-units --type=service --all --no-legend |
    awk '{print $1}' | grep -E '^php[0-9]+\.[0-9]+-fpm\.service$' |
    sort -V | tail -1
  register: _php_fpm_svc
  changed_when: false
  become: true

- name: PHP — fail if no FPM ini found
  ansible.builtin.fail:
    msg: "Could not locate a PHP-FPM php.ini under /etc/php/*/fpm/. Is PHP-FPM installed?"
  when: _php_fpm_ini.stdout | length == 0

- name: PHP — set resolved path/service facts
  ansible.builtin.set_fact:
    php_ini_path: "{{ _php_fpm_ini.stdout | trim }}"
    php_fpm_service: "{{ _php_fpm_svc.stdout | trim }}"

- name: PHP — display detected paths
  ansible.builtin.debug:
    msg: "PHP ini: {{ php_ini_path }} | FPM service: {{ php_fpm_service }}"

# ---------------------------------------------------------------------------
# 2. Back up original php.ini (once — skip if backup already exists)
# ---------------------------------------------------------------------------
- name: PHP — back up original php.ini
  ansible.builtin.copy:
    src: "{{ php_ini_path }}"
    dest: "{{ php_ini_path }}.ccdc.bak"
    remote_src: true
    force: false
    mode: "0644"
  become: true

# ---------------------------------------------------------------------------
# 3. [PHP] section settings
# ---------------------------------------------------------------------------
- name: PHP — disable dangerous functions
  community.general.ini_file:
    path: "{{ php_ini_path }}"
    section: PHP
    option: disable_functions
    value: "{{ php_harden_disable_functions | regex_replace('\\s+', '') }}"
    backup: false
  become: true
  notify: Restart PHP-FPM

- name: PHP — set expose_php Off
  community.general.ini_file:
    path: "{{ php_ini_path }}"
    section: PHP
    option: expose_php
