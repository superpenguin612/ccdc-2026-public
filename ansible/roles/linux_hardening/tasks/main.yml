---
# ---------------------------------------------------------------------------
# 0. Back up config files before touching anything
# ---------------------------------------------------------------------------
- name: linux_hardening — back up config files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ item }}.ccdc.bak"
    remote_src: true
    force: false
    mode: preserve
  become: true
  failed_when: false
  loop:
    - /etc/security/limits.conf
    - /etc/fstab
    - /etc/pam.d/su
    - /etc/sudoers
    - /etc/crontab

# ---------------------------------------------------------------------------
# Disable unnecessary and dangerous services
# ---------------------------------------------------------------------------
- name: Disable unnecessary services
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ linux_hardening_disable_services }}"
  failed_when: false  # services that don't exist should not abort the run
  become: true

# ---------------------------------------------------------------------------
# Ctrl+Alt+Del reboot protection
# ---------------------------------------------------------------------------
- name: Remove existing ctrl-alt-del.target symlink (RHEL workaround)
  ansible.builtin.file:
    path: /etc/systemd/system/ctrl-alt-del.target
    state: absent
  become: true
  when: linux_hardening_disable_ctrl_alt_del

- name: Disable Ctrl+Alt+Del reboot
  ansible.builtin.systemd:
    name: ctrl-alt-del.target
    masked: true
  become: true
  when: linux_hardening_disable_ctrl_alt_del

# ---------------------------------------------------------------------------
# Core dumps
# ---------------------------------------------------------------------------
- name: Disable core dumps via limits.conf
  ansible.builtin.blockinfile:
    path: /etc/security/limits.conf
    marker: "# {mark} CCDC linux_hardening core dumps"
    block: |
      *    hard   core   0
      *    soft   core   0
  become: true
  when: linux_hardening_disable_core_dumps

- name: Disable core dumps via sysctl
  ansible.builtin.blockinfile:
    path: /etc/sysctl.d/99-ccdc-hardening.conf
    marker: "# {mark} CCDC core dumps"
    create: true
    block: |
      fs.suid_dumpable = 0
  become: true
  when: linux_hardening_disable_core_dumps
  notify: Reload sysctl

# ---------------------------------------------------------------------------
# Kernel / network sysctl hardening
# ---------------------------------------------------------------------------
- name: Apply kernel network hardening via sysctl
  ansible.builtin.blockinfile:
    path: /etc/sysctl.d/99-ccdc-hardening.conf
    marker: "# {mark} CCDC network sysctl"
    create: true
    block: |
      # Disable IP source routing
      net.ipv4.conf.all.accept_source_route = 0
      net.ipv4.conf.default.accept_source_route = 0
      net.ipv6.conf.all.accept_source_route = 0
      # Disable ICMP redirects
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv6.conf.all.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0
      # Enable TCP SYN cookies
      net.ipv4.tcp_syncookies = 1
      # Log martian packets
      net.ipv4.conf.all.log_martians = 1
      net.ipv4.conf.default.log_martians = 1
      # Disable IP forwarding (non-router hosts)
      net.ipv4.ip_forward = 0
      # Reverse path filtering
      net.ipv4.conf.all.rp_filter = 1
      net.ipv4.conf.default.rp_filter = 1
      # Ignore ICMP broadcast pings (Smurf)
      net.ipv4.icmp_echo_ignore_broadcasts = 1
      # Ignore bogus ICMP error responses
      net.ipv4.icmp_ignore_bogus_error_responses = 1
      # ASLR
      kernel.randomize_va_space = 2
      # Restrict dmesg
      kernel.dmesg_restrict = 1
      # Restrict kernel pointer leaks in /proc
      kernel.kptr_restrict = 2
      # Restrict ptrace to own processes
      kernel.yama.ptrace_scope = 1
  become: true
  when: linux_hardening_sysctl
  notify: Reload sysctl

# ---------------------------------------------------------------------------
# Restrict /dev/shm to noexec/nosuid/nodev
# ---------------------------------------------------------------------------
- name: Remount /dev/shm with noexec,nosuid,nodev
  ansible.builtin.command: mount -o remount,noexec,nosuid,nodev /dev/shm
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_harden_shared_memory

- name: Persist /dev/shm hardened mount in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\S+\s+/dev/shm\s+'
    line: 'tmpfs /dev/shm tmpfs defaults,noexec,nosuid,nodev 0 0'
    state: present
  become: true
  when: linux_hardening_harden_shared_memory

# ---------------------------------------------------------------------------
# Restrict su to members of the sudo/wheel group
# ---------------------------------------------------------------------------
- name: Restrict su via PAM to wheel/sudo group (Debian)
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^#?\s*auth\s+required\s+pam_wheel\.so'
    line: 'auth required pam_wheel.so use_uid'
    state: present
  become: true
  when:
    - linux_hardening_restrict_su
    - ansible_facts.os_family == 'Debian'

- name: Restrict su via PAM to wheel group (RedHat)
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^#?\s*auth\s+required\s+pam_wheel\.so'
    line: 'auth required pam_wheel.so use_uid'
    state: present
  become: true
  when:
    - linux_hardening_restrict_su
    - ansible_facts.os_family == 'RedHat'

# ---------------------------------------------------------------------------
# Restrict cron and at to authorized users only
# ---------------------------------------------------------------------------
- name: Deploy /etc/cron.allow with authorized users
  ansible.builtin.copy:
    content: "{{ linux_hardening_cron_allowed_users | join('\n') }}\n"
    dest: /etc/cron.allow
    owner: root
    group: root
    mode: "0600"
  become: true
  when: linux_hardening_restrict_cron

- name: Remove /etc/cron.deny (cron.allow takes precedence)
  ansible.builtin.file:
    path: /etc/cron.deny
    state: absent
  become: true
  when: linux_hardening_restrict_cron

- name: Deploy /etc/at.allow with authorized users
  ansible.builtin.copy:
    content: "{{ linux_hardening_cron_allowed_users | join('\n') }}\n"
    dest: /etc/at.allow
    owner: root
    group: root
    mode: "0600"
  become: true
  failed_when: false
  when: linux_hardening_restrict_cron

- name: Remove /etc/at.deny (at.allow takes precedence)
  ansible.builtin.file:
    path: /etc/at.deny
    state: absent
  become: true
  failed_when: false
  when: linux_hardening_restrict_cron

- name: Purge crontabs for unauthorized users
  ansible.builtin.shell: |
    for dir in /var/spool/cron/crontabs /var/spool/cron; do
      [ -d "$dir" ] || continue
      for f in "$dir"/*; do
        [ -f "$f" ] || continue
        user=$(basename "$f")
        allowed=false
        {% for u in linux_hardening_cron_allowed_users %}
        [ "$user" = "{{ u }}" ] && allowed=true
        {% endfor %}
        if [ "$allowed" = "false" ]; then
          echo "Removed crontab for unauthorized user: $user"
          rm -f "$f"
        fi
      done
    done
  become: true
  when: linux_hardening_restrict_cron
  register: _cron_purge
  changed_when: "'Removed' in _cron_purge.stdout"

- name: Strip job lines from /etc/crontab (keep variable definitions)
  ansible.builtin.shell: |
    if [ -f /etc/crontab ]; then
      grep -E '^\s*(#|SHELL=|PATH=|MAILTO=|HOME=|LOGNAME=|[A-Z_]+=|$)' /etc/crontab > /tmp/_crontab_clean || true
      mv /tmp/_crontab_clean /etc/crontab
      chmod 600 /etc/crontab
      echo "Stripped job lines from /etc/crontab"
    fi
  become: true
  changed_when: false
  when: linux_hardening_restrict_cron

# ---------------------------------------------------------------------------
# Secure permissions on sensitive files
# ---------------------------------------------------------------------------
- name: Harden permissions on sensitive system files
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/passwd,       group: root,   mode: "0644" }
    - { path: /etc/shadow,       group: shadow, mode: "0640" }
    - { path: /etc/group,        group: root,   mode: "0644" }
    - { path: /etc/gshadow,      group: shadow, mode: "0640" }
    - { path: /etc/crontab,      group: root,   mode: "0600" }
    - { path: /etc/cron.d,       group: root,   mode: "0700" }
    - { path: /etc/cron.hourly,  group: root,   mode: "0700" }
    - { path: /etc/cron.daily,   group: root,   mode: "0700" }
    - { path: /etc/cron.weekly,  group: root,   mode: "0700" }
    - { path: /etc/cron.monthly, group: root,   mode: "0700" }
  become: true
  failed_when: false

# ---------------------------------------------------------------------------
# Audit: Non-root UID 0 accounts
# ---------------------------------------------------------------------------
- name: Find non-root UID 0 accounts
  ansible.builtin.shell: |
    awk -F: '($3 == 0 && $1 != "root") { print $1 }' /etc/passwd
  register: _uid0_extra
  changed_when: false
  become: true
  when: linux_hardening_uid0_audit

# ---------------------------------------------------------------------------
# Audit: Empty password accounts (and lock them)
# ---------------------------------------------------------------------------
- name: Find accounts with empty passwords
  ansible.builtin.shell: |
    awk -F: '($2 == "" || $2 == "!!") { print $1 }' /etc/shadow
  register: _empty_pass
  changed_when: false
  become: true
  when: linux_hardening_empty_password_audit

- name: Lock accounts with empty passwords
  ansible.builtin.user:
    name: "{{ item }}"
    password_lock: true
  loop: "{{ _empty_pass.stdout_lines | default([]) }}"
  become: true
  when:
    - linux_hardening_empty_password_audit
    - _empty_pass.stdout_lines | default([]) | length > 0

# ---------------------------------------------------------------------------
# Audit: Service accounts with login shells
# ---------------------------------------------------------------------------
- name: Find service accounts with interactive shells
  ansible.builtin.shell: |
    awk -F: '($3 < 1000 && $3 != 0 && $7 !~ /(nologin|false)/) { print $1 " (" $7 ")" }' /etc/passwd
  register: _svc_shells
  changed_when: false
  become: true
  when: linux_hardening_service_account_audit

# ---------------------------------------------------------------------------
# Sudo hardening
# ---------------------------------------------------------------------------
- name: Remove immutable bit from /etc/sudoers before writing
  ansible.builtin.command: chattr -i /etc/sudoers
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_sudo_hardening

- name: Find sudoers drop-in files
  ansible.builtin.find:
    paths: /etc/sudoers.d
    patterns: "*"
    hidden: yes
  become: true
  register: _sudoers_drop_ins
  when: linux_hardening_sudo_hardening

- name: Ensure local artifact directory exists for sudo backup
  ansible.builtin.file:
    path: "{{ artifact_root }}/linux_hardening/{{ inventory_hostname }}/sudoers.d"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: linux_hardening_sudo_hardening

- name: Back up /etc/sudoers to controller
  ansible.builtin.fetch:
    src: /etc/sudoers
    dest: "{{ artifact_root }}/linux_hardening/{{ inventory_hostname }}/sudoers.original"
    flat: true
  become: true
  when: linux_hardening_sudo_hardening

- name: Back up sudoers drop-ins to controller
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ artifact_root }}/linux_hardening/{{ inventory_hostname }}/sudoers.d/{{ item.path | basename }}"
    flat: true
  become: true
  loop: "{{ _sudoers_drop_ins.files | default([]) }}"
  when: linux_hardening_sudo_hardening

- name: Replace /etc/sudoers with hardened version
  ansible.builtin.copy:
    dest: /etc/sudoers
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
    content: |
      # Managed by Ansible (CCDC hardening) — do not edit manually
      Defaults    env_reset
      Defaults    mail_badpass
      Defaults    secure_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      Defaults    logfile="/var/log/sudo.log"
      Defaults    log_input,log_output
      Defaults    passwd_tries=3
      Defaults    passwd_timeout=1
      Defaults    timestamp_timeout=5

      root    ALL=(ALL:ALL) ALL
      %sudo   ALL=(ALL:ALL) ALL
      %wheel  ALL=(ALL:ALL) ALL
  become: true
  when: linux_hardening_sudo_hardening

- name: Delete all sudoers drop-in files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  become: true
  loop: "{{ _sudoers_drop_ins.files | default([]) }}"
  when: linux_hardening_sudo_hardening

- name: Make /etc/sudoers immutable (chattr +i)
  ansible.builtin.command: chattr +i /etc/sudoers
  become: true
  changed_when: false
  when: linux_hardening_sudo_hardening

# ---------------------------------------------------------------------------
# Additional sysctl params not in the network block
# ---------------------------------------------------------------------------
- name: Apply additional kernel hardening sysctl
  ansible.builtin.blockinfile:
    path: /etc/sysctl.d/99-ccdc-hardening.conf
    marker: "# {mark} CCDC extra kernel sysctl"
    create: true
    block: |
      net.ipv6.conf.all.forwarding = 0
      net.ipv4.tcp_max_syn_backlog = 4096
      net.ipv4.tcp_fin_timeout = 30
      net.ipv4.tcp_keepalive_time = 600
      net.ipv4.tcp_keepalive_probes = 5
      net.ipv4.tcp_keepalive_intvl = 15
      net.ipv4.conf.all.secure_redirects = 0
      net.ipv4.conf.default.secure_redirects = 0
      kernel.sysrq = 0
      kernel.perf_event_paranoid = 3
      kernel.unprivileged_bpf_disabled = 1
      fs.protected_symlinks = 1
      fs.protected_hardlinks = 1
      fs.protected_fifos = 2
      fs.protected_regular = 2
      vm.mmap_min_addr = 65536
  become: true
  when: linux_hardening_sysctl
  notify: Reload sysctl

# ---------------------------------------------------------------------------
# Kernel module blacklist
# ---------------------------------------------------------------------------
- name: Blacklist dangerous kernel modules
  ansible.builtin.copy:
    dest: /etc/modprobe.d/ccdc-blacklist.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      install dccp /bin/true
      install sctp /bin/true
      install rds /bin/true
      install tipc /bin/true
      install cramfs /bin/true
      install freevxfs /bin/true
      install hfs /bin/true
      install hfsplus /bin/true
      install udf /bin/true
  become: true
  when: linux_hardening_module_blacklist

- name: Unload blacklisted modules if loaded
  ansible.builtin.shell: rmmod {{ item }} 2>/dev/null || true
  loop: [dccp, sctp, rds, tipc, cramfs, freevxfs, hfs, hfsplus, udf]
  become: true
  changed_when: false
  when: linux_hardening_module_blacklist

# ---------------------------------------------------------------------------
# nproc limits (fork bomb defense)
# ---------------------------------------------------------------------------
- name: Set nproc limits to defend against fork bombs
  ansible.builtin.blockinfile:
    path: /etc/security/limits.conf
    marker: "# {mark} CCDC nproc limits"
    block: |
      * soft nproc 1024
      * hard nproc 2048
      root soft nproc unlimited
      root hard nproc unlimited
  become: true
  when: linux_hardening_nproc_limits

# ---------------------------------------------------------------------------
# Home directory permissions
# ---------------------------------------------------------------------------
- name: Secure /root directory
  ansible.builtin.file:
    path: /root
    owner: root
    group: root
    mode: "0700"
  become: true
  when: linux_hardening_home_permissions

- name: Find home directories under /home
  ansible.builtin.find:
    paths: /home
    file_type: directory
    recurse: false
  register: _home_dirs
  become: true
  when: linux_hardening_home_permissions

- name: Set home directory permissions to 700
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "0700"
  loop: "{{ _home_dirs.files | default([]) }}"
  become: true
  when: linux_hardening_home_permissions

- name: Secure GRUB config (BIOS)
  ansible.builtin.file:
    path: /boot/grub/grub.cfg
    mode: "0600"
  become: true
  failed_when: false
  when: linux_hardening_home_permissions

- name: Secure GRUB config (UEFI/RHEL)
  ansible.builtin.file:
    path: /boot/grub2/grub.cfg
    mode: "0600"
  become: true
  failed_when: false
  when: linux_hardening_home_permissions

# ---------------------------------------------------------------------------
# World-writable file remediation
# ---------------------------------------------------------------------------
- name: Find world-writable files (excluding /proc /sys /dev)
  ansible.builtin.shell: |
    find / -xdev -type f -perm -0002 \
      ! -path "/proc/*" ! -path "/sys/*" ! -path "/dev/*" \
      2>/dev/null | head -200
  register: _ww_files
  changed_when: false
  become: true
  when: linux_hardening_world_writable

- name: Remove world-write from world-writable files
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "o-w"
  loop: "{{ _ww_files.stdout_lines | default([]) }}"
  become: true
  failed_when: false
  when: linux_hardening_world_writable

- name: Find world-writable directories without sticky bit
  ansible.builtin.shell: |
    find / -xdev -type d \( -perm -0002 -a ! -perm -1000 \) \
      ! -path "/proc/*" ! -path "/sys/*" ! -path "/dev/*" \
      2>/dev/null | head -200
  register: _ww_dirs
  changed_when: false
  become: true
  when: linux_hardening_world_writable

- name: Add sticky bit to world-writable directories
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "o+t"
  loop: "{{ _ww_dirs.stdout_lines | default([]) }}"
  become: true
  failed_when: false
  when: linux_hardening_world_writable

# ---------------------------------------------------------------------------
# SUID/SGID audit and remediation
# ---------------------------------------------------------------------------
- name: Find all SUID binaries
  ansible.builtin.shell: find / -xdev -perm -4000 -type f 2>/dev/null
  register: _suid_files
  changed_when: false
  become: true
  when: linux_hardening_remove_suid

- name: Find all SGID binaries
  ansible.builtin.shell: find / -xdev -perm -2000 -type f 2>/dev/null
  register: _sgid_files
  changed_when: false
  become: true
  when: linux_hardening_remove_suid

- name: Identify unexpected SUID binaries
  ansible.builtin.set_fact:
    _suid_unexpected: "{{ _suid_files.stdout_lines | difference(linux_hardening_suid_known_good) }}"
  when: linux_hardening_remove_suid

- name: Ensure local SUID report directory exists
  ansible.builtin.file:
    path: "{{ artifact_root }}/linux_hardening/{{ inventory_hostname }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: linux_hardening_remove_suid

- name: Save SUID/SGID audit report to controller
  ansible.builtin.copy:
    content: |
      SUID/SGID Audit Report — {{ inventory_hostname }}
      ===================================================

      UNEXPECTED SUID BINARIES ({{ _suid_unexpected | default([]) | length }}):
      {% for f in _suid_unexpected | default([]) %}
      - {{ f }}
      {% endfor %}
      {% if _suid_unexpected | default([]) | length == 0 %}
      (none — all SUID files are known-good)
      {% endif %}

      ALL SUID FILES ({{ _suid_files.stdout_lines | default([]) | length }}):
      {% for f in _suid_files.stdout_lines | default([]) %}
      - {{ f }}
      {% endfor %}

      ALL SGID FILES ({{ _sgid_files.stdout_lines | default([]) | length }}):
      {% for f in _sgid_files.stdout_lines | default([]) %}
      - {{ f }}
      {% endfor %}
    dest: "{{ artifact_root }}/linux_hardening/{{ inventory_hostname }}/suid_audit.txt"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: linux_hardening_remove_suid

- name: Remove SUID/SGID from non-essential binaries
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "u-s,g-s"
  loop: "{{ linux_hardening_suid_remove_list }}"
  become: true
  failed_when: false
  when: linux_hardening_remove_suid

- name: Remove SUID from GTFOBins (privilege escalation via SUID abuse)
  ansible.builtin.shell: |
    for bin in find vim nmap less awk sed python python3 perl ruby tar zip netcat nc; do
      path=$(which "$bin" 2>/dev/null) || continue
      [ -u "$path" ] && chmod u-s "$path" && echo "Removed SUID from $path"
    done
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_remove_suid

# ---------------------------------------------------------------------------
# Restrict compilers (prevent on-box exploit compilation)
# ---------------------------------------------------------------------------
- name: Restrict compiler binaries to root-only (chmod 000)
  ansible.builtin.shell: |
    for bin in gcc g++ make cc clang clang++ as ld; do
      path=$(which "$bin" 2>/dev/null) || continue
      chmod 000 "$path" && echo "Restricted $path"
    done
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_restrict_compilers


# ---------------------------------------------------------------------------
# ld.so.preload check and truncation
# ---------------------------------------------------------------------------
- name: Check /etc/ld.so.preload
  ansible.builtin.stat:
    path: /etc/ld.so.preload
  register: _ldpreload_stat
  become: true

- name: Read /etc/ld.so.preload if it exists
  ansible.builtin.command: cat /etc/ld.so.preload
  register: _ldpreload_content
  become: true
  changed_when: false
  when: _ldpreload_stat.stat.exists

- name: Truncate /etc/ld.so.preload if non-empty
  ansible.builtin.copy:
    content: ""
    dest: /etc/ld.so.preload
    owner: root
    group: root
    mode: "0644"
  become: true
  when:
    - _ldpreload_stat.stat.exists
    - _ldpreload_content.stdout | default('') | trim | length > 0

# ---------------------------------------------------------------------------
# Lock unnecessary system accounts
# ---------------------------------------------------------------------------
- name: Lock unnecessary system accounts
  ansible.builtin.user:
    name: "{{ item }}"
    password_lock: true
  loop:
    - sync
    - games
    - lp
    - news
    - uucp
    - proxy
    - list
    - irc
    - gnats
    - nobody
  become: true
  failed_when: false
  when: linux_hardening_lock_system_accounts

# ---------------------------------------------------------------------------
# SSH banner + login banners
# ---------------------------------------------------------------------------
- name: Deploy SSH warning banner
  ansible.builtin.copy:
    dest: /etc/ssh/banner
    owner: root
    group: root
    mode: "0644"
    content: |
      ========================================================================
                            AUTHORIZED ACCESS ONLY
        All activities are monitored and logged. Unauthorized access will be
        reported and prosecuted to the fullest extent of the law.
      ========================================================================
  become: true
  when: linux_hardening_ssh_banner

- name: Deploy /etc/issue login banner (local console)
  ansible.builtin.copy:
    dest: "{{ item }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      UNAUTHORIZED ACCESS PROHIBITED.
      ALL ACTIVITY IS MONITORED AND RECORDED.
      VIOLATIONS WILL BE PROSECUTED TO THE FULLEST EXTENT OF THE LAW.
  loop:
    - /etc/issue
    - /etc/issue.net
    - /etc/motd
  become: true
  when: linux_hardening_ssh_banner

# ---------------------------------------------------------------------------
# Immutable critical files (chattr +i)
# ---------------------------------------------------------------------------
- name: Remove immutable bit from critical files before writing (idempotency)
  ansible.builtin.command: chattr -i {{ item }}
  loop:
    - /etc/passwd
    - /etc/shadow
    - /etc/group
    - /etc/gshadow
    - /etc/cron.allow
    - /etc/at.allow
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_immutable_files

- name: Make critical system files immutable (chattr +i)
  ansible.builtin.command: chattr +i {{ item }}
  loop:
    - /etc/passwd
    - /etc/shadow
    - /etc/group
    - /etc/gshadow
    - /etc/cron.allow
    - /etc/at.allow
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_immutable_files

# ---------------------------------------------------------------------------
# /tmp and /var/tmp noexec enforcement
# ---------------------------------------------------------------------------
- name: Remount /tmp with noexec,nosuid,nodev
  ansible.builtin.command: mount -o remount,noexec,nosuid,nodev /tmp
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_tmp_noexec

- name: Persist /tmp hardened mount in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\S+\s+/tmp\s+'
    line: 'tmpfs /tmp tmpfs defaults,noexec,nosuid,nodev 0 0'
    state: present
  become: true
  when: linux_hardening_tmp_noexec

- name: Remount /var/tmp with noexec,nosuid,nodev
  ansible.builtin.command: mount -o remount,noexec,nosuid,nodev /var/tmp
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_tmp_noexec

- name: Persist /var/tmp hardened mount in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\S+\s+/var/tmp\s+'
    line: 'tmpfs /var/tmp tmpfs defaults,noexec,nosuid,nodev 0 0'
    state: present
  become: true
  when: linux_hardening_tmp_noexec

# ---------------------------------------------------------------------------
# /proc hidepid — hide other users' processes
# ---------------------------------------------------------------------------
- name: Remount /proc with hidepid=2
  ansible.builtin.command: mount -o remount,hidepid=2 /proc
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_hidepid

- name: Persist /proc hidepid=2 in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\S+\s+/proc\s+'
    line: 'proc /proc proc defaults,hidepid=2 0 0'
    state: present
  become: true
  when: linux_hardening_hidepid

# ---------------------------------------------------------------------------
# Disable IPv6 if not needed
# ---------------------------------------------------------------------------
- name: Disable IPv6 via sysctl
  ansible.builtin.blockinfile:
    path: /etc/sysctl.d/99-ccdc-hardening.conf
    marker: "# {mark} CCDC disable IPv6"
    create: true
    block: |
      net.ipv6.conf.all.disable_ipv6 = 1
      net.ipv6.conf.default.disable_ipv6 = 1
      net.ipv6.conf.lo.disable_ipv6 = 1
  become: true
  when: linux_hardening_disable_ipv6
  notify: Reload sysctl

# ---------------------------------------------------------------------------
# Disable USB storage
# ---------------------------------------------------------------------------
- name: Blacklist USB storage module
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/ccdc-blacklist.conf
    line: 'install usb-storage /bin/true'
    state: present
    create: true
  become: true
  when: linux_hardening_disable_usb_storage

- name: Unload usb-storage module if loaded
  ansible.builtin.command: rmmod usb-storage
  become: true
  changed_when: false
  failed_when: false
  when: linux_hardening_disable_usb_storage

# ---------------------------------------------------------------------------
# Kill active non-Ansible user sessions
# ---------------------------------------------------------------------------
- name: Kill active login sessions for unauthorized users
  ansible.builtin.shell: |
    KEEP="{{ vault_new_credentials[inventory_hostname].user }}"
    for user in $(who | awk '{print $1}' | sort -u); do
      [ "$user" = "$KEEP" ] && continue
      [ "$user" = "root" ] && continue
      echo "Killed sessions for: $user"
      pkill -KILL -u "$user" 2>/dev/null || true
    done
  become: true
  register: _killed_sessions
  changed_when: "'Killed' in _killed_sessions.stdout"
  when: linux_hardening_kill_sessions

# ---------------------------------------------------------------------------
# Consolidated audit report — all findings gathered above, reported once
# ---------------------------------------------------------------------------
- name: Build consolidated audit report
  ansible.builtin.set_fact:
    _hardening_report: |
      ============================================================
      linux_hardening audit report — {{ inventory_hostname }}
      ============================================================

      [UID0] Non-root accounts with UID 0:
      {% if _uid0_extra.stdout_lines | default([]) | length > 0 %}
      {% for u in _uid0_extra.stdout_lines %}
        !! {{ u }}
      {% endfor %}
      {% else %}
        (none)
      {% endif %}

      [EMPTY_PASS] Accounts with empty passwords (locked):
      {% if _empty_pass.stdout_lines | default([]) | length > 0 %}
      {% for u in _empty_pass.stdout_lines %}
        !! {{ u }}
      {% endfor %}
      {% else %}
        (none)
      {% endif %}

      [SVC_SHELLS] Service accounts with interactive shells:
      {% if _svc_shells.stdout_lines | default([]) | length > 0 %}
      {% for u in _svc_shells.stdout_lines %}
        !! {{ u }}
      {% endfor %}
      {% else %}
        (none)
      {% endif %}

      [SUID] Unexpected SUID binaries:
      {% if _suid_unexpected | default([]) | length > 0 %}
      {% for f in _suid_unexpected %}
        !! {{ f }}
      {% endfor %}
      {% else %}
        (none)
      {% endif %}

      [LD_PRELOAD] /etc/ld.so.preload entries (truncated if found):
      {% if _ldpreload_stat.stat.exists | default(false) and _ldpreload_content.stdout | default('') | trim | length > 0 %}
        !! {{ _ldpreload_content.stdout | trim }}
      {% else %}
        (none)
      {% endif %}

      [CRON_PURGE] Unauthorized crontabs removed:
      {% if _cron_purge.stdout | default('') | trim | length > 0 %}
        {{ _cron_purge.stdout | trim }}
      {% else %}
        (none)
      {% endif %}

      [SESSIONS] Sessions killed:
      {% if _killed_sessions.stdout | default('') | trim | length > 0 %}
        {{ _killed_sessions.stdout | trim }}
      {% else %}
        (none)
      {% endif %}

      ============================================================

- name: Print audit report
  ansible.builtin.debug:
    msg: "{{ _hardening_report.split('\n') }}"

- name: Ensure local artifact directory exists for hardening report
  ansible.builtin.file:
    path: "{{ artifact_root }}/linux_hardening/{{ inventory_hostname }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Save audit report to controller
  ansible.builtin.copy:
    content: "{{ _hardening_report }}"
    dest: "{{ artifact_root }}/linux_hardening/{{ inventory_hostname }}/audit_report.txt"
    mode: "0600"
  delegate_to: localhost
  become: false
