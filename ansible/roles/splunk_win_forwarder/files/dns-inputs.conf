# =============================================================================
# Splunk UF — DNS inputs (deployed to svc_dns / domain_controllers hosts)
# =============================================================================

# ---------------------------------------------------------------------------
# DNS Server audit event log — queries, zone changes, config changes
# ---------------------------------------------------------------------------
[WinEventLog://Microsoft-Windows-DNS-Server/Audit]
disabled = 0
index = dns
renderXml = false
start_from = oldest
current_only = 0

# ---------------------------------------------------------------------------
# DNS debug log file (must be enabled on the DNS server first)
# Enable with: dnscmd /config /logLevel 0x8100F331
#              dnscmd /config /logFilePath C:\Windows\System32\dns\dns.log
#              dnscmd /config /logFileMaxSize 500000000
# ---------------------------------------------------------------------------
[monitor://C:\Windows\System32\dns\dns.log]
disabled = 0
index = dns
sourcetype = ms:dns:debug
recursive = false

# ---------------------------------------------------------------------------
# Active Directory event logs (domain controller only)
# ---------------------------------------------------------------------------
[WinEventLog://Directory Service]
disabled = 0
index = windows
renderXml = false
start_from = oldest
current_only = 0

[WinEventLog://DFS Replication]
disabled = 0
index = windows
renderXml = false
start_from = oldest
current_only = 0

# Kerberos / authentication service events
[WinEventLog://Microsoft-Windows-Kerberos/Operational]
disabled = 0
index = windows
renderXml = false
start_from = oldest
current_only = 0

[WinEventLog://Microsoft-Windows-Kerberos-Key-Distribution-Center/Operational]
disabled = 0
index = windows
renderXml = false
start_from = oldest
current_only = 0
