# =============================================================================
# Splunk UF — IIS inputs (deployed to svc_iis and svc_iis_ftp hosts)
# =============================================================================

# ---------------------------------------------------------------------------
# IIS W3C access logs — web server
# The log path pattern covers all sites and date-rolled log files
# ---------------------------------------------------------------------------
[monitor://C:\inetpub\logs\LogFiles\...]
disabled = 0
index = iis
sourcetype = iis
recursive = true
whitelist = \.log$

# ---------------------------------------------------------------------------
# IIS FTP log (same path convention, different sourcetype)
# ---------------------------------------------------------------------------
[monitor://C:\inetpub\logs\LogFiles\MSFTPSVC...]
disabled = 0
index = iis
sourcetype = iis:ftp
recursive = true
whitelist = \.log$

# ---------------------------------------------------------------------------
# Failed Request Tracing (FREB) logs — detailed IIS error info
# ---------------------------------------------------------------------------
[monitor://C:\inetpub\logs\FailedReqLogFiles\...]
disabled = 0
index = iis
sourcetype = iis:freb
recursive = true
whitelist = \.xml$
