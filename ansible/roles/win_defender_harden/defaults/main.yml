---
# ---------------------------------------------------------------------------
# Windows Defender Hardening — toggles for each feature
# ---------------------------------------------------------------------------

# Real-time protection
win_defender_enable_realtime: true

# Remove all existing exclusions (red team adds C:\ etc.)
win_defender_clear_exclusions: true

# PUA (Potentially Unwanted Application) detection
win_defender_enable_pua: true

# Force signature update
win_defender_update_signatures: true

# Cloud-delivered protection
win_defender_cloud_protection: true

# ---------------------------------------------------------------------------
# Attack Surface Reduction (ASR) rules
# Mode: 1 = Block, 2 = Audit, 0 = Disabled
# ---------------------------------------------------------------------------
win_defender_enable_asr: true
win_defender_asr_mode: 1  # 1=Block, 2=Audit

# ASR rule GUIDs — each maps to a specific protection
win_defender_asr_rules:
  # Block Office apps from creating child processes
  - "d4f940ab-401b-4efc-aadc-ad5f3c50688a"
  # Block Office apps from creating executable content
  - "3b576869-a4ec-4529-8536-b80a7769e899"
  # Block executable content from email client and webmail
  - "be9ba2d9-53ea-4cdc-84e5-9b1eeee46550"
  # Block execution of potentially obfuscated scripts
  - "5beb7efe-fd9a-4556-801d-275e5ffc04cc"
  # Block credential stealing from LSASS
  - "9e6c4e1f-7d60-472f-ba1a-a39ef669e4b2"
  # Block process creations from PSExec and WMI commands
  - "d1e49aac-8f56-4280-b9ba-993a6d77406c"
  # Block untrusted/unsigned processes from USB
  - "b2b3f03d-6a65-4f7b-a9c7-1c7ef74a9ba4"
  # Block Win32 API calls from Office macros
  - "92e97fa1-2edf-4476-bdd6-9dd0b4dddc7b"
  # Block JavaScript/VBScript from launching downloaded content
  - "d3e037e1-3eb8-44c8-a917-57927947596d"
