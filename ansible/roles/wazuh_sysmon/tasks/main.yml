---
- name: Check if Sysmon is Installed
  ansible.windows.win_service:
    name: Sysmon64
  register: sysmon_service
  ignore_errors: true

- name: Ensure Sysmon Directory Exists
  ansible.windows.win_file:
    path: "{{ sysmon_install_location }}"
    state: directory
  when: not sysmon_service.exists

- name: Copy Sysmon ZIP
  ansible.windows.win_copy:
    src: Sysmon.zip
    dest: "{{ sysmon_install_location }}\\Sysmon.zip"
  when: not sysmon_service.exists

- name: Extract Sysmon ZIP
  community.windows.win_unzip:
    src: "{{ sysmon_install_location }}\\Sysmon.zip"
    dest: "{{ sysmon_install_location }}"
    delete_archive: yes
  when: not sysmon_service.exists

- name: Copy Sysmon Configuration
  ansible.windows.win_copy:
    src: sysmonconfig.xml
    dest: "{{ sysmon_install_location }}\\sysmonconfig.xml"
  when: not sysmon_service.exists

- name: Install Sysmon with Configuration
  ansible.windows.win_command: "{{ sysmon_install_location }}\\Sysmon64.exe -accepteula -i {{ sysmon_install_location }}\\sysmonconfig.xml"
  args:
    creates: 'C:\Windows\System32\drivers\SysmonDrv.sys'
  when: not sysmon_service.exists

- name: Remove Sysmon Installation Files
  ansible.windows.win_file:
    path: "{{ sysmon_install_location }}"
    state: absent
  when: not sysmon_service.exists

- name: Verify Sysmon Service is Running
  ansible.windows.win_service:
    name: Sysmon64
    state: started
    start_mode: auto

- name: Check if Wazuh Already Forwards Sysmon Logs
  ansible.windows.win_shell: |
    if (Get-Content 'C:\Program Files (x86)\ossec-agent\ossec.conf' -ErrorAction SilentlyContinue | Select-String '<location>Microsoft-Windows-Sysmon/Operational</location>' -Quiet) {
      Write-Output 'found'
    } else {
      Write-Output ''
    }
  changed_when: false
  register: sysmon_wazuh_config

- name: Ensure Wazuh Forwards Sysmon Logs
  randrej.windows.win_blockinfile:
    path: 'C:\Program Files (x86)\ossec-agent\ossec.conf'
    insertbefore: "</ossec_config>"
    block: |
      <localfile>
        <location>Microsoft-Windows-Sysmon/Operational</location>
        <log_format>eventchannel</log_format>
      </localfile>
    marker: "<!-- CCDC Wazuh Sysmon {mark} -->"
    state: present
  when: sysmon_wazuh_config.stdout == ''
  notify: Restart Wazuh Agent
