---
- name: Rotate credentials on Linux hosts (excluding controller)
  hosts: linux:!controller
  gather_facts: no
  vars:
    use_default_creds: true
    ansible_port: 22
  roles:
    - linux_rotate_creds

- name: Harden SSH on Linux hosts
  hosts: linux
  gather_facts: true
  vars:
    ansible_port: 22
  tags: [ssh]
  roles:
    - linux_harden_ssh

- name: Disable SSH server on controller
  hosts: controller
  tags: [ssh, disable_ssh]
  gather_facts: no
  tasks:
    - name: Stop, disable, and mask SSH services and sockets if present
      ansible.builtin.shell: |
        for unit in ssh.service sshd.service ssh.socket sshd.socket; do
          if systemctl list-units --all --no-legend "$unit" 2>/dev/null | grep -q "$unit"; then
            systemctl stop "$unit" 2>/dev/null || true
            systemctl disable "$unit" 2>/dev/null || true
            systemctl mask "$unit" 2>/dev/null || true
          fi
        done
      become: yes
      changed_when: false

- name: Set up hosts on controller
  hosts: controller
  gather_facts: no
  roles:
    - controller_hosts