---
all:
  vars:
    team_number: 12
  children:
    linux:
      hosts:
        ubuntu-ecom:
          ansible_host: 172.20.242.30
          ip_internal: 172.20.242.30
          ip_external: "172.25.{{ 20 + team_number }}.11"
        fedora-webmail:
          ansible_host: 172.20.242.40
          ip_internal: 172.20.242.40
          ip_external: "172.25.{{ 20 + team_number }}.39"
          linux_sudo_group: wheel
        splunk:
          ansible_host: 172.20.242.20
          ip_internal: 172.20.242.20
          ip_external: "172.25.{{ 20 + team_number }}.9"
          linux_sudo_group: wheel
        ubuntu-wkst:
          ansible_host: 127.0.0.1
          ansible_connection: local
          ip_internal: DHCP
          ip_external: 172.16.101.254

    windows:
      hosts:
        server-ad-dns:
          ansible_host: "172.25.{{ 20 + team_number }}.155"
          ip_internal: 172.20.240.102
          ip_external: "172.25.{{ 20 + team_number }}.155"
        server-web:
          ansible_host: "172.25.{{ 20 + team_number }}.140"
          ip_internal: 172.20.240.101
          ip_external: "172.25.{{ 20 + team_number }}.140"
        server-ftp:
          ansible_host: "172.25.{{ 20 + team_number }}.162"
          ip_internal: 172.20.240.104
          ip_external: "172.25.{{ 20 + team_number }}.162"
        win11-wkst:
          ansible_host: "172.25.{{ 20 + team_number }}.144"
          ip_internal: 172.20.240.100
          ip_external: "172.25.{{ 20 + team_number }}.144"
          ad_disable_user: "UserOne"   # domain account to disable after credential rotation

    domain_controllers:
      hosts:
        server-ad-dns:

    domain_members:
      hosts:
        server-web:
        server-ftp:
        win11-wkst:

    firewalls:
      hosts:
        palo-alto1:
          ansible_host: 172.20.242.150
          ip_internal: 172.20.242.150
          ansible_connection: local
          pub_net: "172.25.{{ 20 + team_number }}.0/25"
          int_net: "172.20.242.0/24"
          mgmt_allowed_ip: "172.20.242.0/24"  # ubuntu-wkst is DHCP; allow full Linux subnet
          protected_group: palo1_protected
        palo-alto2:
          ansible_host: 127.0.0.1
          panos_port: 8443            # SSH tunnel: localhost:8443 → ip_internal:443 via win11-wkst
          ip_internal: 172.20.240.200
          ansible_connection: local
          pub_net: "172.25.{{ 20 + team_number }}.128/25"
          int_net: "172.20.240.0/24"
          mgmt_allowed_ip: "172.20.240.100"   # win11-wkst (SSH tunnel endpoint)
          protected_group: palo2_protected

    controller:
      hosts:
        ubuntu-wkst:

    palo1_protected:
      hosts:
        ubuntu-ecom:
        fedora-webmail:
        splunk:
        ubuntu-wkst:

    palo2_protected:
      hosts:
        server-ad-dns:
        server-web:
        server-ftp:
        win11-wkst:

    svc_apache2:
      hosts:
        ubuntu-ecom:
        
    svc_postfix:
      hosts:
        fedora-webmail:
        
    svc_splunk:
      hosts:
        splunk:
        
    svc_dns:
      hosts:
        server-ad-dns:
        
    svc_iis:
      hosts:
        server-web:
        
    svc_iis_ftp:
      hosts:
        server-ftp:

    svc_mysql:
      hosts:
        ubuntu-ecom:

    svc_wazuh:
      hosts:
        splunk:

    svc_ssh:
      hosts:
        ubuntu-ecom:
        fedora-webmail:
        splunk:

    svc_ntp:
      hosts: {}

    svc_tftp:
      hosts: {}

    fw_http:
      children:
        svc_apache2:
        svc_iis:

    fw_https:
      children: {}
        
    fw_smtp:
      children:
        svc_postfix:

    fw_pop3:
      children:
        svc_postfix:

    fw_imap:
      children: {}
        
    fw_ftp:
      children:
        svc_iis_ftp:

    fw_dns:
      children:
        svc_dns:
    
    fw_splunk:
      children:
        svc_splunk:

    fw_wazuh:
      children:
        svc_wazuh:

    fw_ssh:
      children:
        svc_ssh:

    fw_ntp:
      children:
        svc_ntp:

    fw_tftp:
      children:
        svc_tftp:
